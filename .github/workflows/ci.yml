name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages first (needed for dist/ resolution)
        run: pnpm -r --filter=!@naculus/connector-wagmi build

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: pnpm test:run

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Check changeset
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx changeset status --since=main 2>/dev/null || echo "⚠️  No changeset found — run 'pnpm changeset' to document API/behavior changes"
          fi

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages first (needed for dist/ resolution)
        run: pnpm -r --filter=!@naculus/connector-wagmi build

      - name: Run coverage
        run: pnpm test:coverage

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: ./coverage/
